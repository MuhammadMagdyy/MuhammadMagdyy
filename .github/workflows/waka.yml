name: Update WakaTime Stats

on:
  schedule:
    - cron: "0 0 * * *"   # Runs once a day at midnight UTC
  workflow_dispatch:        # Manual trigger available too

jobs:
  update-readme:
    runs-on: ubuntu-latest
    name: Update README with WakaTime Stats
    
    # CRITICAL: Allows the action to push the updated README back to your repo
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4 # Upgraded to v4

      - name: Update WakaTime Stats in README
        uses: anmol098/waka-readme-stats@master # Consider changing to a pinned version like @v5 if available
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SHOW_OS: "True"
          SHOW_EDITORS: "True"
          SHOW_LANGUAGE: "True"
          SHOW_PROJECTS: "True"
          SHOW_TIMEZONE: "True"
          SHOW_LINES_OF_CODE: "True"
          SHOW_COMMIT: "True"

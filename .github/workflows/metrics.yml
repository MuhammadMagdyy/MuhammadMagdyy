name: GitHub Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Crucial to let the action commit the SVG file
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: MuhammadMagdyy   # Updated with your actual GitHub username
          template: classic
          base: header, activity, community, repositories
          plugin_languages: yes
          plugin_habits: yes
          plugin_achievements: yes
          output_action: commit
          filename: github-metrics.svg
